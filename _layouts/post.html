---
layout: default
---

<article class="post">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">&larr; Back to Blog</a>
    <h1>{{ page.title }}</h1>
    <p class="post-meta">
      {{ page.date | date: "%B %-d, %Y" }}
      {% if page.reading_time %} &middot; {{ page.reading_time }}{% endif %}
      {% if page.tags and page.tags.size > 0 %} &middot; {{ page.tags | join: ", " }}{% endif %}
    </p>
  </header>

  <div class="prose">
    {{ content }}
  </div>
</article>
